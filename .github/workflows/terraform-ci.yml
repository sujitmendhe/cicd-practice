name: Terraform CI

on:
  push:
    branches:
      - main
      - feature/**
  pull_request:

jobs:
  terraforms:
    runs-on: ubuntu-latest

    permissions:
      id-token: write
      contents: read
    
    env:
      AWS_REGION: us-east-1

    steps:
      - name: Checkout repo
        uses: action/checkout@v4

      - name: Setup Terraform
        uses: hashicorp/setup-terraform@v2
        with:
          terraform_version: 1.6.6

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ secrets.AWS_GITHUB_ROLE_ARN }}
          aws-region: ${{ env.AWS_REGION }}
    \*Uses OIDC with a role (AWS_GITHUB_ROLE_ARN secret) instead of storing long‑lived access keys, which is increasingly the recommended way to connect GitHub Actions to AWS.

Runs validation and plan on every push/PR.

You can later add an apply job only on main and maybe with workflow_dispatch for manual approval.

You will need to:

Create an IAM role in AWS that trusts GitHub’s OIDC provider and lets Terraform manage your infra.

Put that role ARN into a GitHub secret AWS_GITHUB_ROLE_ARN. *\

      - name: Terraform fmt
        run: terraform fmt -check

      - name: Terraform init
        run: terraform init

      - name: Terraform validate
        run: terraform validate
      
      - name: Terraform plan
        run: terraform plan -input=false
      