name: Terraform CI

on:
  push:
    branches:
      - main
      - feature/**
  pull_request:

jobs:
  terraforms:
    runs-on: ubuntu-latest

    permissions:
      id-token: write
      contents: read
    
    env:
      AWS_REGION: us-east-1

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4 

      - name: Setup Terraform
        uses: hashicorp/setup-terraform@v2
        with:
          terraform_version: 1.6.6

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ secrets.AWS_GITHUB_ROLE_ARN }}
          aws-region: ${{ env.AWS_REGION }}
    # Uses OIDC with a role (AWS_GITHUB_ROLE_ARN secret)
# instead of storing long-lived AWS access keys.
#
# Runs validation and plan on every push/PR.
#
# Later you can add a terraform apply job that
# runs only on the main branch.
#
# Prerequisites:
# - Create an IAM role that trusts GitHub's OIDC provider.
# - Store the role ARN in the GitHub secret:
#   AWS_GITHUB_ROLE_ARN
      - name: Terraform fmt
        run: terraform fmt -check

      - name: Terraform init
        run: terraform init

      - name: Terraform validate
        run: terraform validate
      
      - name: Terraform plan
        run: terraform plan -input=false
      